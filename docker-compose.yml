services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: co2-backend
    user: "1000:1000"
    ports:
      - "8072:8072"
    devices:
      - "/dev/bus/usb:/dev/bus/usb"
      - "/dev/hidraw0:/dev/hidraw0"
    volumes:
      - co2_data:/app/data
    restart: unless-stopped
    environment:
      - TZ=Asia/Yekaterinburg
      - PUID=1000
      - PGID=1000
      # Ensure data directory is world-writable for non-root user
      - DOCKER_FIX_PERMISSIONS=true

volumes:
  co2_data:
